<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THRAGG Intelligence Dashboard</title>

  <!-- Preconnect to Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Design System -->
  <link rel="stylesheet" href="../frontend/css/design-tokens.css">
  <link rel="stylesheet" href="../frontend/css/reset.css">
  <link rel="stylesheet" href="../frontend/css/typography.css">
  <link rel="stylesheet" href="../frontend/css/animations.css">

  <!-- Layout & Components -->
  <link rel="stylesheet" href="../frontend/css/layout.css">
  <link rel="stylesheet" href="../frontend/css/components.css">
  <link rel="stylesheet" href="../frontend/css/intelligence-core.css">
  <link rel="stylesheet" href="../frontend/css/views.css">

  <meta name="description" content="THRAGG Cybersecurity Intelligence Dashboard">
  <meta name="theme-color" content="#070b14">

  <style>
    @keyframes loadingBar {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
  </style>
</head>
<body>
  <!-- Embedded backend JSON data (injected by DashboardGenerator) -->
  <script id="thragg-dashboard-data" type="application/json">__THRAGG_DASHBOARD_DATA__</script>

  <noscript>
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#070b14;color:#94a3b8;font-family:Inter,sans-serif;text-align:center;padding:24px;">
      <div>
        <h1 style="color:#f1f5f9;font-size:20px;margin-bottom:12px;">THRAGG Dashboard</h1>
        <p>JavaScript is required to render this dashboard.</p>
        <p style="font-size:13px;margin-top:8px;">Please enable JavaScript and reload the page.</p>
      </div>
    </div>
  </noscript>

  <div id="app">
    <!-- Initial loading state — replaced by app.js init -->
    <div id="loading-splash" style="display:flex;align-items:center;justify-content:center;height:100vh;background:#070b14;flex-direction:column;gap:16px;">
      <div style="width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#6c5ce7,#a29bfe);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:20px;font-family:Inter,sans-serif;">T</div>
      <div style="width:120px;height:3px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;">
        <div style="width:40%;height:100%;background:linear-gradient(90deg,#6c5ce7,#a29bfe);border-radius:4px;animation:loadingBar 1.2s ease-in-out infinite;"></div>
      </div>
      <div style="font-size:11px;color:#64748b;font-family:Inter,sans-serif;letter-spacing:0.08em;text-transform:uppercase;">Loading Intelligence Core</div>
    </div>
  </div>

  <!-- Read embedded JSON and set as THRAGG_DATA before loading components -->
  <script>
    try {
      const embeddedData = document.getElementById('thragg-dashboard-data');
      if (embeddedData && embeddedData.textContent && embeddedData.textContent !== '__THRAGG_DASHBOARD_DATA__') {
        window.THRAGG_DATA = JSON.parse(embeddedData.textContent);
      }
    } catch (e) {
      console.warn('Failed to parse embedded dashboard data:', e);
    }
    // Clear loading splash once data is ready
    document.addEventListener('DOMContentLoaded', function() {
      var splash = document.getElementById('loading-splash');
      if (splash) splash.style.display = 'none';
    });
  </script>

  <!-- Application scripts -->
  <script src="../frontend/js/utils/charts.js"></script>
  <script src="../frontend/js/utils/animations.js"></script>

  <script src="../frontend/js/components/Sidebar.js"></script>
  <script src="../frontend/js/components/TopNavigation.js"></script>
  <script src="../frontend/js/components/IntelligenceCore.js"></script>
  <script src="../frontend/js/components/AssessmentScope.js"></script>
  <script src="../frontend/js/components/KPICards.js"></script>
  <script src="../frontend/js/components/SecurityPosture.js"></script>
  <script src="../frontend/js/components/RiskDistribution.js"></script>
  <script src="../frontend/js/components/DomainCoverage.js"></script>
  <script src="../frontend/js/components/AttackChainExplorer.js"></script>
  <script src="../frontend/js/components/MITRECoverage.js"></script>
  <script src="../frontend/js/components/TraceabilityExplorer.js"></script>
  <script src="../frontend/js/components/KnowledgeGraph.js"></script>
  <script src="../frontend/js/components/Recommendations.js"></script>
  <script src="../frontend/js/components/ReportDownloads.js"></script>
  <script src="../frontend/js/components/ActivityTimeline.js"></script>

  <script src="../frontend/js/app.js"></script>
</body>
</html>
