<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THRAGG Intelligence Dashboard</title>

  <!-- Preconnect to Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Design System -->
  <link rel="stylesheet" href="css/design-tokens.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/typography.css">
  <link rel="stylesheet" href="css/animations.css">

  <!-- Layout & Components -->
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/intelligence-core.css">
  <link rel="stylesheet" href="css/views.css">

  <meta name="description" content="THRAGG Cybersecurity Intelligence Dashboard — Threat Hunting Recon & Automated Gap Analysis Gateway">
  <meta name="theme-color" content="#070b14">
</head>
<body>
  <noscript>
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#070b14;color:#94a3b8;font-family:Inter,sans-serif;text-align:center;padding:24px;">
      <div>
        <h1 style="color:#f1f5f9;font-size:20px;margin-bottom:12px;">THRAGG Dashboard</h1>
        <p>JavaScript is required to render this dashboard.</p>
        <p style="font-size:13px;margin-top:8px;">Please enable JavaScript and reload the page.</p>
      </div>
    </div>
  </noscript>

  <div id="app">
    <!-- Initial loading state — replaced by JS -->
    <div id="loading-splash" style="display:flex;align-items:center;justify-content:center;height:100vh;background:#070b14;flex-direction:column;gap:16px;">
      <div style="width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#6c5ce7,#a29bfe);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:20px;font-family:Inter,sans-serif;">T</div>
      <div style="width:120px;height:3px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;">
        <div style="width:40%;height:100%;background:linear-gradient(90deg,#6c5ce7,#a29bfe);border-radius:4px;animation:loadingBar 1.2s ease-in-out infinite;"></div>
      </div>
      <div style="font-size:11px;color:#64748b;font-family:Inter,sans-serif;letter-spacing:0.08em;text-transform:uppercase;">Loading Intelligence Core</div>
    </div>
  </div>

  <style>
    @keyframes loadingBar {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
  </style>

  <!-- Mock dataset (replaced by backend JSON in next session) -->
  <script src="js/data.js"></script>

  <!-- Utility helpers -->
  <script src="js/utils/charts.js"></script>
  <script src="js/utils/animations.js"></script>

  <!-- Components -->
  <script src="js/components/Sidebar.js"></script>
  <script src="js/components/TopNavigation.js"></script>
  <script src="js/components/IntelligenceCore.js"></script>
  <script src="js/components/AssessmentScope.js"></script>
  <script src="js/components/KPICards.js"></script>
  <script src="js/components/SecurityPosture.js"></script>
  <script src="js/components/RiskDistribution.js"></script>
  <script src="js/components/DomainCoverage.js"></script>
  <script src="js/components/AttackChainExplorer.js"></script>
  <script src="js/components/MITRECoverage.js"></script>
  <script src="js/components/TraceabilityExplorer.js"></script>
  <script src="js/components/KnowledgeGraph.js"></script>
  <script src="js/components/Recommendations.js"></script>
  <script src="js/components/ReportDownloads.js"></script>
  <script src="js/components/ActivityTimeline.js"></script>

  <!-- Application -->
  <script src="js/app.js"></script>
</body>
</html>
